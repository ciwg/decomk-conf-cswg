# This file is the policy map for decomk.
# A "context" is a key on the left side of ":".
# A context expands into a list of tokens on the right side.
#
# A token can be:
# - another context key (macro-style composition),
# - or a tuple (`NAME=value`) passed to make as a variable.
# - `NAME=$` means "use incoming environment value for NAME when set".
#
# Bare make target names are intentionally not allowed on the RHS. Put
# target lists inside tuple values (for example
# `updateContent='Block10'`).

#
# This conf repo uses a block model:
# - `Block*` targets are shared baseline image layers,
# - special repo features (for example FPGA or GUI desktop) are separate targets
#   that are referenced by action tuples.
#

DEFAULT:
  updateContent='Block10'
  postCreate='Block10 postCreateUserDemo'
  HELLO_TEXT='Hello from DEFAULT context'
  DEVCONTAINER_GUI=0
  DECOMK_MOTD_PHASES='88:version,93:updateContent,94:postCreate'

# Baseline image configuration -- this should be advanced to Block10,
# Block20, etc. as those Makefile targets are frozen.
decomk-conf-cswg:
  updateContent='Block00'
  postCreate='Block00'
  HELLO_TEXT='Hello from decmk-conf-cswg context'

mob-sandbox:
  updateContent='Block00'
  postCreate='Block00 postCreateUserDemo'
  HELLO_TEXT='Hello from mob-sandbox context'


# Shared feature bundle for FPGA-oriented repos.
FPGA:
  updateContent='Block10 FPGA'
  postCreate='Block10 FPGA postCreateUserDemo'

# Shared feature bundle for GUI-desktop-oriented repos.
GUI_DESKTOP:
  updateContent='Block10 GUIDesktop'
  DEVCONTAINER_GUI=1
  postCreate='Block10 GUIDesktop postCreateUserDemo'

# Repo key can be bare repo name.
# For per-owner customization, you can also define an `owner/repo` key.
# Note: `DEFAULT` is applied automatically by decomk when it exists.
fpga-workbench: FPGA
  HELLO_TEXT='Hello from fpga-workbench context'

# Repo key can be bare repo name.
# For per-owner customization, you can also define an `owner/repo` key.
# Note: `DEFAULT` is applied automatically by decomk when it exists.
mob-sandbox: GUI_DESKTOP
  HELLO_TEXT='Hello from mob-sandbox context'
